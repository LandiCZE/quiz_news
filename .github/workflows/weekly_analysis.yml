name: Weekly Quiz Facts Analysis

on:
  schedule:
    - cron: "0 10 * * 0"  # every Sunday at 10:00 UTC (12:00 Prague time)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis and save facts
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          mkdir -p facts
          FILENAME="facts/$(date +%Y-W%V).json"
          python main.py --weeks-ago 1 --save "$FILENAME"

      - name: Render index.html
        run: python render.py

      - name: Commit facts and page
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add facts/ index.html
          git diff --cached --quiet || git commit -m "chore: weekly facts $(date +%Y-W%V)"
          git pull --rebase origin main
          git push origin main
